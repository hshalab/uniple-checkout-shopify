# uniple Thank you / Order status — pay link extension
# codex Path A 採用: Manual Payment offline gateway で order pending、
# Thank you / Order status page にこの UI extension で pay button を表示。
# 購入者 click → uniple checkoutUrl 遷移 → MetaMask 送金 → webhook で paid 確定。
#
# r80+ migration: @shopify/ui-extensions 2026.4 (= preact base) で書き直し。
# 64 KB bundle 制限を React 全 bundle 排除で対応 (= codex 査読確定)。

api_version = "2026-04"
uid = "9414993e-f365-e652-82d3-7a5674bf82d878dfa94e"

[[extensions]]
name = "uniple pay link"
handle = "uniple-thank-you-pay-link"
type = "ui_extension"

  [[extensions.targeting]]
  module = "./src/PurchaseThankYouBlock.tsx"
  target = "purchase.thank-you.block.render"

  [[extensions.targeting]]
  module = "./src/CustomerAccountOrderStatusBlock.tsx"
  target = "customer-account.order-status.block.render"

  [[extensions.metafields]]
  namespace = "uniple"
  key = "checkout_url"

  [[extensions.metafields]]
  namespace = "uniple"
  key = "session_id"

  [[extensions.metafields]]
  namespace = "uniple"
  key = "status"
